<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Relato | Fiscaliza DF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
     <link rel="stylesheet" href="/static/css/responsivo.css">
    <style>
       @media (max-width: 375px) {

 .arrumaristo {
            width: 100px !important;
        }

       }
         @media (max-width: 414px) {

 .arrumaristo {
            width: 100px !important;
        }

       }
         @media (max-width: 430px) {

 .arrumaristo {
            width: 100px !important;
        }

       }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        #map-selector { height: 400px; width: 100%; border-radius: 1rem; z-index: 1; border: 4px solid white; cursor: crosshair; }
        input:checked + .cat-card { border-color: #1d4ed8; background: #eff6ff; transform: scale(1.05); }
        .cat-card { transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-20">

    <nav class="p-6">
        <a href="/" class="text-blue-700 font-bold">← Voltar para o Mapa</a>
    </nav>

    <main class="max-w-3xl mx-auto px-6">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
            <div class="bg-blue-700 p-8 text-white">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Registrar Problema</h2>
                <p class="opacity-80">Sua denúncia ajuda a construir um DF melhor.</p>
            </div>

            <form id="form-relato" action="/enviar" method="POST" enctype="multipart/form-data" class="p-8 space-y-10">
                



<input type="hidden" name="spam_token" value="{{ token }}">

<div class="anti-spam-box">
    <p>Quanto é {{ n1 }} + {{ n2 }}?</p>
    <input type="number" name="spam_answer" required placeholder="Resposta">
</div>





                <div>
                    <label class="block text-slate-800 font-black uppercase text-xs tracking-widest mb-4">1. Tipo de Problema</label>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        
                        <label class="relative cursor-pointer">
                            <input type="radio" name="category" value="Buraco na rua" class="hidden">
                            <div class="cat-card p-4 border-2 border-slate-100 rounded-2xl text-center hover:bg-slate-50">
                                <span class="text-3xl mb-1 block">🕳️</span>
                                <span class="text-[9px] font-black uppercase text-slate-500">Buraco na rua</span>
                            </div>
                        </label>

                        <label class="relative cursor-pointer">
                            <input type="radio" name="category" value="Iluminação pública" class="hidden">
                            <div class="cat-card p-4 border-2 border-slate-100 rounded-2xl text-center hover:bg-slate-50">
                                <span class="text-3xl mb-1 block">💡</span>
                                <span class="text-[9px] font-black uppercase text-slate-500">Iluminação</span>
                            </div>
                        </label>

                        <label class="relative cursor-pointer">
                            <input type="radio" name="category" value="Lixo acumulado" class="hidden">
                            <div class="cat-card p-4 border-2 border-slate-100 rounded-2xl text-center hover:bg-slate-50">
                                <span class="text-3xl mb-1 block">♻️</span>
                                <span class="text-[9px] font-black uppercase text-slate-500">Lixo Acumulado</span>
                            </div>
                        </label>

                        <label class="relative cursor-pointer">
                            <input type="radio" name="category" value="Problema em praça" class="hidden">
                            <div class="cat-card p-4 border-2 border-slate-100 rounded-2xl text-center hover:bg-slate-50">
                                <span class="text-3xl mb-1 block">🌳</span>
                                <span class="text-[9px] font-black uppercase text-slate-500">Prob. em Praça</span>
                            </div>
                        </label>

                        <label class="relative cursor-pointer">
                            <input type="radio" name="category" value="Transporte público" class="hidden">
                            <div class="cat-card p-4 border-2 border-slate-100 rounded-2xl text-center hover:bg-slate-50">
                                <span class="text-3xl mb-1 block">🚌</span>
                                <span class="text-[9px] font-black uppercase text-slate-500">Transp. Público</span>
                            </div>
                        </label>

                        <label class="relative cursor-pointer">
                            <input type="radio" name="category" value="Segurança" class="hidden">
                            <div class="cat-card p-4 border-2 border-slate-100 rounded-2xl text-center hover:bg-slate-50">
                                <span class="text-3xl mb-1 block">🚔</span>
                                <span class="text-[9px] font-black uppercase text-slate-500">Segurança</span>
                            </div>
                        </label>

                        <label class="relative cursor-pointer">
                            <input type="radio" name="category" value="Acidentes" class="hidden">
                            <div class="cat-card p-4 border-2 border-slate-100 rounded-2xl text-center hover:bg-slate-50">
                                <span class="text-3xl mb-1 block">⚠️</span>
                                <span class="text-[9px] font-black uppercase text-slate-500">Acidentes</span>
                            </div>
                        </label>

                        <label class="relative cursor-pointer">
                            <input type="radio" name="category" value="Melhorias" class="hidden">
                            <div class="cat-card p-4 border-2 border-slate-100 rounded-2xl text-center hover:bg-slate-50">
                                <span class="text-3xl mb-1 block">🏗️</span>
                                <span class="text-[9px] font-black uppercase text-slate-500">Melhorias</span>
                            </div>
                        </label>

                    </div>
                </div>

                <div>
                    <label class="block text-slate-800 font-black uppercase text-xs tracking-widest mb-4">2. Localização (Clique no Satélite)</label>
                    <div id="map-selector" class="shadow-inner"></div>
                    <input type="hidden" name="lat" id="lat" value="-15.7938">
                    <input type="hidden" name="lng" id="lng" value="-47.8827">
                    
                    <div class="mt-4">
                        <label class="text-xs font-bold text-slate-400 uppercase">Região Administrativa</label>
                        <select name="ra" id="ra_select" class="w-full mt-1 p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold" required>
                            <option value="">Selecione a RA...</option>
                            <option value="Brasília">Brasília</option>
                            <option value="Ceilândia">Ceilândia</option>
                            <option value="Taguatinga">Taguatinga</option>
                            <option value="Samambaia">Samambaia</option>
                            <option value="Guará">Guará</option>
                            <option value="Águas Claras">Águas Claras</option>
                            <option value="Sobradinho">Sobradinho</option>
                            <option value="Planaltina">Planaltina</option>
                            </select>
                    </div>
                </div>

                <div>
                    <label class="block text-slate-800 font-black uppercase text-xs tracking-widest mb-4">3. Tirar Foto do Local</label>
                    <div class="relative border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center hover:bg-slate-50 transition-all group">
                        <input type="file" name="image" id="image-input" accept="image/*" capture="environment" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                        <div id="preview-text">
                            <span class="text-3xl mb-1 block">📸</span>
                            <p class="text-[10px] font-black uppercase text-slate-400">Clique para abrir a câmera ou galeria</p>
                        </div>
                        <img id="image-preview" src="#" class="hidden mx-auto h-48 rounded-2xl shadow-lg border-4 border-white">
                    </div>
                </div>

                <div>
                    <label class="block text-slate-800 font-black uppercase text-xs tracking-widest mb-2">4. Descrição</label>
                    <textarea name="description" placeholder="Ex: Buraco profundo na via..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl h-32 outline-none" required></textarea>
                </div>

<div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 space-y-4">
    <label class="block text-slate-800 font-black uppercase text-xs tracking-widest">
        5. Verificação de Segurança
    </label>

    <div style="display:none;">
        <input type="text" name="website" tabindex="-1" autocomplete="off">
    </div>

    <div class="flex items-center gap-4">
        <div class="bg-white px-4 py-3 rounded-xl border-2 border-slate-200 font-black text-blue-700">
            Quanto é {{ n1 }} + {{ n2 }}?
        </div>
        <input type="number" name="spam_answer" placeholder="Resposta" 
               class="arrumaristo flex-1 p-3 bg-white border-2 border-slate-200 rounded-xl font-bold outline-none focus:border-blue-500" 
               required>
    </div>
    <p class="text-[9px] text-slate-400 uppercase font-bold italic">Prove que você não é um robô para evitar spams.</p>
</div>

                <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-200 uppercase tracking-widest transition-all transform active:scale-95">
                    Protocolar Denúncia
                </button>
            </form>
        </div>
    </main>

    <script>
        // Configuração do Mapa
        const bounds = L.latLngBounds(L.latLng(-16.1, -48.3), L.latLng(-15.4, -47.2));
        var map = L.map('map-selector', { maxBounds: bounds }).setView([-15.7938, -47.8827], 11);

        L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains:['mt0','mt1','mt2','mt3']
        }).addTo(map);

        var marker;
        map.on('click', function(e) {
            if (marker) map.removeLayer(marker);
            marker = L.marker(e.latlng).addTo(map);
            document.getElementById('lat').value = e.latlng.lat;
            document.getElementById('lng').value = e.latlng.lng;
            map.flyTo(e.latlng, 17);
        });

        // --- VALIDAÇÃO DE CATEGORIA ---
        document.getElementById('form-relato').onsubmit = function(e) {
            const categoriaMarcada = document.querySelector('input[name="category"]:checked');
            if (!categoriaMarcada) {
                e.preventDefault(); // Bloqueia envio
                alert("Para Proseguir, Marque a Opção que mais defina o seu problema.");
                return false;
            }
        };

        // --- PREVIEW DA FOTO ---
        document.getElementById('image-input').onchange = function() {
            const [file] = this.files;
            if (file) {
                document.getElementById('image-preview').src = URL.createObjectURL(file);
                document.getElementById('image-preview').classList.remove('hidden');
                document.getElementById('preview-text').classList.add('hidden');
            }
        };

        setTimeout(() => map.invalidateSize(), 500);
    </script>
</body>
</html>
