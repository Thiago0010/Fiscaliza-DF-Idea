<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Relato | Fiscaliza DF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map-selector { height: 400px; width: 100%; border-radius: 1rem; z-index: 1; border: 4px solid white; cursor: crosshair; }
        input:checked + .cat-card { border-color: #1d4ed8; background: #eff6ff; transform: scale(1.05); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-20">

    <nav class="p-6">
        <a href="/" class="text-blue-700 font-bold">← Voltar para o Mapa</a>
    </nav>

    <main class="max-w-3xl mx-auto px-6">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
            <div class="bg-blue-700 p-8 text-white">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Registrar Problema</h2>
                <p class="opacity-80">Sua denúncia ajuda a construir um DF mais organizado.</p>
            </div>

            <form action="/enviar" method="POST" class="p-8 space-y-10">
                
                <div>
                    <label class="block text-slate-800 font-black uppercase text-xs tracking-widest mb-4">1. Tipo de Problema</label>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        {% for cat in categorias %}
                        <label class="relative cursor-pointer">
                            <input type="radio" name="category" value="{{ cat.nome }}" class="hidden" required>
                            <div class="cat-card p-4 border-2 border-slate-100 rounded-2xl text-center transition-all hover:bg-slate-50">
                                <span class="text-3xl mb-1 block">{{ cat.icone }}</span>
                                <span class="text-[9px] font-black uppercase text-slate-500">{{ cat.nome }}</span>
                            </div>
                        </label>
                        {% endfor %}
                    </div>
                </div>

                <div>
                    <label class="block text-slate-800 font-black uppercase text-xs tracking-widest mb-4">2. Localização (Clique no Satélite)</label>
                    <div id="map-selector" class="shadow-inner"></div>
                    <input type="hidden" name="lat" id="lat" value="-15.7938">
                    <input type="hidden" name="lng" id="lng" value="-47.8827">
                    
                    <div class="mt-4">
                        <label class="text-xs font-bold text-slate-400 uppercase">Região Administrativa</label>
                        <select name="ra" id="ra_select" class="w-full mt-1 p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold" required>
                            <option value="">Selecione a RA...</option>
                            {% for ra in regioes %}
                            <option value="{{ ra }}">{{ ra }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-slate-800 font-black uppercase text-xs tracking-widest mb-2">3. Descrição dos Fatos</label>
                    <textarea name="description" placeholder="Ex: Buraco profundo na via..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl h-32 outline-none focus:ring-2 focus:ring-blue-600 transition-all" required></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-200 uppercase tracking-widest transition-all transform active:scale-95">
                    Protocolar Denúncia
                </button>
            </form>
        </div>
    </main>

    <script>
        const bounds = L.latLngBounds(L.latLng(-16.1, -48.3), L.latLng(-15.4, -47.2));
        var map = L.map('map-selector', { maxBounds: bounds }).setView([-15.7938, -47.8827], 11);

        // Satélite Google
        L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains:['mt0','mt1','mt2','mt3']
        }).addTo(map);

        var marker;

        map.on('click', function(e) {
            if (marker) map.removeLayer(marker);
            marker = L.marker(e.latlng).addTo(map);
            document.getElementById('lat').value = e.latlng.lat;
            document.getElementById('lng').value = e.latlng.lng;
            map.flyTo(e.latlng, 17);

            // Tenta detectar a RA via API
            fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${e.latlng.lat}&lon=${e.latlng.lng}`)
                .then(r => r.json()).then(data => {
                    const local = data.address.suburb || data.address.city_district || "";
                    const select = document.getElementById('ra_select');
                    for (let i=0; i<select.options.length; i++) {
                        if (local.toLowerCase().includes(select.options[i].value.toLowerCase())) {
                            select.selectedIndex = i;
                            break;
                        }
                    }
                });
        });

        setTimeout(() => map.invalidateSize(), 500);
    </script>
</body>
</html>
