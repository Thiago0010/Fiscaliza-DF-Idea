<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Geográfico | Fiscaliza DF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #fullscreen-map { height: calc(100vh - 80px); width: 100%; z-index: 1; }
        .leaflet-popup-content-wrapper { border-radius: 1rem; }
    </style>
</head>
<body class="bg-slate-900 overflow-hidden">
    <nav class="h-20 bg-slate-900 border-b border-slate-800 px-6 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="/" class="text-white bg-slate-800 p-2 rounded-lg hover:bg-slate-700 transition">←</a>
            <h1 class="text-white font-black uppercase italic tracking-tighter">Painel <span class="text-blue-500">Vivo</span></h1>
        </div>
        <div class="flex gap-3">
            <span class="bg-blue-900/50 text-blue-400 text-[10px] font-bold px-3 py-1 rounded-full border border-blue-800">DISTRITO FEDERAL</span>
            <a href="/relatar" class="bg-blue-600 text-white text-[10px] font-black px-4 py-1 rounded-full uppercase tracking-widest hover:bg-blue-500 transition">Novo Relato</a>
        </div>
    </nav>

    <div id="fullscreen-map"></div>

    <script>
        const bounds = L.latLngBounds(L.latLng(-16.1, -48.3), L.latLng(-15.4, -47.2));
        var map = L.map('fullscreen-map', { maxBounds: bounds }).setView([-15.7938, -47.8827], 11);

        L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], attribution: '© Google'
        }).addTo(map);

        {% for d in denuncias %}
     

// Renderizar as denúncias no mapa com Foto e Descrição
{% for d in denuncias %}
        // Verifica se existem coordenadas válidas antes de criar o marcador
        if ("{{ d.lat }}" && "{{ d.lng }}") {
            L.marker([{{ d.lat }}, {{ d.lng }}]).addTo(map)
                .bindPopup(`
                    <div style="width: 200px; font-family: sans-serif;">
                        {% if d.image and d.image != 'None' %}
                            <img src="/static/uploads/{{ d.image }}" style="width:100%; height:100px; object-fit:cover; border-radius:10px; mb-2">
                        {% endif %}
                        <b style="color:#1d4ed8; text-transform:uppercase; font-size:12px;">{{ d.category }}</b><br>
                        <small style="font-weight:bold; color:#64748b;">{{ d.ra }}</small>
                        <hr style="margin:8px 0; border:0; border-top:1px solid #eee;">
                        <p style="font-size:11px; color:#334155; margin:0;">{{ d.description[:100] }}...</p>
                    </div>
                `);
        }
    {% endfor %}
{% endfor %}





{% for d in denuncias %}
    L.marker([{{ d.lat }}, {{ d.lng }}]).addTo(map)
        .bindPopup(`
            <div style="width:220px; font-family:sans-serif;">
                <b style="color:#1d4ed8;">{{ d.category }}</b><br>
                <small>Status Atual: <b>{{ d.status }}</b></small>
                <hr style="margin:8px 0;">
                
                <div style="font-size:10px; color:#64748b;">
                    <b>LINHA DO TEMPO:</b><br>
                    • {{ d.date }}: Criado (Aberto)<br>
                    
                    {% for h in historicos %}
                        {% if h.report_id == d.id %}
                            • {{ h.data_modificacao }}: {{ h.status_novo }}<br>
                        {% endif %}
                    {% endfor %}
                </div>
            </div>
        `);
{% endfor %}







    </script>
</body>
</html>
